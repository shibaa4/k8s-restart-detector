name: Kubernetes Restart Detector

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  detect-restarts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Restart Detector
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python restart_detector.py
